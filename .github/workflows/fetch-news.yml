# RSS 피드를 매일 아침 자동 수집해 backend/data를 갱신하고 커밋한다
name: Fetch news

on:
  schedule:
    # UTC 22:00 = KST 07:00. 매일 아침 출근 전 수집한다.
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install backend dependencies
        working-directory: backend
        run: npm install --no-audit --no-fund

      - name: Collect RSS feeds
        working-directory: backend
        run: npm run fetch

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain backend/data)" ]; then
            git add backend/data
            git commit -m "chore: auto-collect news $(date -u +%Y-%m-%d)"
            git push
          else
            echo "변경 사항이 없어 커밋을 건너뜁니다."
          fi
